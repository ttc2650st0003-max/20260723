<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="style.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>メイン</title>
</head>
<body>
    <main>
        <h1>ふわふわパンケーキの作り方</h1>

        <h2>材料</h2>

        <ul>
            <li>ホットケーキミックス 200g</li>
            <li>牛乳 150ml</li>
            <li>卵 1個</li>
        </ul>

        <h2>作り方</h2>

        <ol>
            <li>ボウルに材料を入れて混ぜます。</li>
            <li>フライパンで両面を焼きます。</li>
            <li>お皿に盛り付けて完成です。</li>
        </ol>
    </main>
</body>
</html>
